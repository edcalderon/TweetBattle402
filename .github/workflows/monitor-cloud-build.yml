name: Monitor Cloud Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to monitor
        required: false
        type: string
      build_id:
        description: Explicit Cloud Build ID to monitor
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'tweetbattle402' }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || 'projects/877960262099/locations/global/workloadIdentityPools/github-actions/providers/github' }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL || 'tb4-967@tweetbattle402.iam.gserviceaccount.com' }}
      TARGET_COMMIT_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_sha || github.sha }}
      TARGET_BUILD_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.build_id || '' }}

    steps:
      - name: Validate GitHub variables
        run: |
          set -euo pipefail
          printf 'Using project %s, region %s, provider %s, service account %s\n' \
            "$GCP_PROJECT_ID" \
            "$GCP_REGION" \
            "$GCP_WORKLOAD_IDENTITY_PROVIDER" \
            "$GCP_SERVICE_ACCOUNT_EMAIL"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Monitor Cloud Build
        id: monitor
        run: |
          set -euo pipefail

          build_id="${TARGET_BUILD_ID:-}"
          if [ -z "$build_id" ]; then
            echo "Searching for Cloud Build tied to commit ${TARGET_COMMIT_SHA}..."
            deadline=$((SECONDS + 1800))
            while [ -z "$build_id" ] && [ "$SECONDS" -lt "$deadline" ]; do
              build_id="$(gcloud builds list \
                --project="$GCP_PROJECT_ID" \
                --region="$GCP_REGION" \
                --filter="source_provenance.resolved_repo_source.commit_sha=${TARGET_COMMIT_SHA}" \
                --sort-by="~create_time" \
                --limit=1 \
                --format="value(id)")"
              if [ -z "$build_id" ]; then
                sleep 15
              fi
            done
          fi

          if [ -z "$build_id" ]; then
            echo "::error::No Cloud Build found for commit ${TARGET_COMMIT_SHA}"
            exit 1
          fi

          log_url="$(gcloud builds describe "$build_id" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format="value(logUrl)")"

          echo "Monitoring Cloud Build ${build_id}"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "### Cloud Build monitor" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit SHA: \`${TARGET_COMMIT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build ID: \`${build_id}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Logs: ${log_url}" >> "$GITHUB_STEP_SUMMARY"

          while true; do
            status="$(gcloud builds describe "$build_id" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --format="value(status)")"

            case "$status" in
              QUEUED|WORKING|PENDING)
                echo "Cloud Build ${build_id} is ${status}"
                sleep 20
                ;;
              SUCCESS)
                echo "Cloud Build ${build_id} succeeded"
                echo "- Status: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                break
                ;;
              FAILURE|CANCELLED|TIMEOUT|EXPIRED|INTERNAL_ERROR)
                echo "::error::Cloud Build ${build_id} finished with status ${status}"
                echo "- Status: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                exit 1
                ;;
              *)
                echo "::warning::Unexpected Cloud Build status ${status}; continuing to poll"
                sleep 20
                ;;
            esac
          done
