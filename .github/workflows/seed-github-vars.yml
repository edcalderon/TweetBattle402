name: Seed GitHub Variables

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: seed-github-vars-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Seed repository variables
        uses: actions/github-script@v7
        with:
          script: |
            const vars = [
              { name: 'GCP_PROJECT_ID', value: 'tweetbattle402' },
              { name: 'GCP_REGION', value: 'us-central1' },
              {
                name: 'GCP_WORKLOAD_IDENTITY_PROVIDER',
                value: 'projects/877960262099/locations/global/workloadIdentityPools/github-actions/providers/github',
              },
              {
                name: 'GCP_SERVICE_ACCOUNT_EMAIL',
                value: 'tb4-967@tweetbattle402.iam.gserviceaccount.com',
              },
            ];

            for (const variable of vars) {
              try {
                await github.request('POST /repos/{owner}/{repo}/actions/variables', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: variable.name,
                  value: variable.value,
                });
                core.info(`Created ${variable.name}`);
              } catch (error) {
                if (error.status !== 422) throw error;

                await github.request('PATCH /repos/{owner}/{repo}/actions/variables/{name}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: variable.name,
                  value: variable.value,
                });
                core.info(`Updated ${variable.name}`);
              }
            }

            core.summary
              .addHeading('Seeded repository variables')
              .addList(vars.map((variable) => variable.name))
              .write();
